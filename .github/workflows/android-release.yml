name: Android Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: "21"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android NDK
        run: |
          set -euo pipefail
          NDK_VER=$(sed -n -E 's/.*ndkVersion = "(.*)".*/\1/p' app/build.gradle.kts | tr -d ' ')
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;$NDK_VER"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$NDK_VER" >> "$GITHUB_ENV"

      - name: Verify Android NDK toolchain
        run: |
          set -euo pipefail
          "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/clang" --version

      - name: Build restic binaries
        run: |
          set -euo pipefail
          ./scripts/build_restic.sh

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Validate signing secrets
        env:
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_SIGNING_KEYSTORE_BASE64"
          test -n "$ANDROID_SIGNING_STORE_PASSWORD"
          test -n "$ANDROID_SIGNING_KEY_ALIAS"
          test -n "$ANDROID_SIGNING_KEY_PASSWORD"

      - name: Decode keystore
        env:
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          KEYSTORE_PATH="$RUNNER_TEMP/android-release-signing.jks"
          printf '%s' "$ANDROID_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          test -s "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          echo "ANDROID_SIGNING_KEYSTORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Build signed release APKs
        env:
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew --no-daemon clean assembleRelease

      - name: Collect release APKs
        id: collect_apks
        run: |
          set -euo pipefail
          mapfile -t apks < <(find app/build/outputs/apk -type f -path '*/release/*.apk' | sort)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "No APK files were produced."
            exit 1
          fi

          if find app/build/outputs/apk -type f -path '*/release/*unsigned*.apk' | grep -q .; then
            echo "Unsigned APKs were found in release outputs."
            find app/build/outputs/apk -type f -path '*/release/*unsigned*.apk'
            exit 1
          fi

          mkdir -p release-assets
          for apk in "${apks[@]}"; do
            cp "$apk" release-assets/
          done

          {
            echo "files<<EOF"
            find release-assets -type f -name '*.apk' | sort
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build F-Droid repo index
        env:
          FDROID_REPO_KEYSTORE_BASE64: ${{ secrets.FDROID_REPO_KEYSTORE_BASE64 }}
          FDROID_REPO_KEY_ALIAS: ${{ secrets.FDROID_REPO_KEY_ALIAS }}
          FDROID_REPO_KEYSTORE_PASSWORD: ${{ secrets.FDROID_REPO_KEYSTORE_PASSWORD }}
          FDROID_REPO_KEY_PASSWORD: ${{ secrets.FDROID_REPO_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$FDROID_REPO_KEYSTORE_BASE64"
          test -n "$FDROID_REPO_KEY_ALIAS"
          test -n "$FDROID_REPO_KEYSTORE_PASSWORD"
          test -n "$FDROID_REPO_KEY_PASSWORD"

          mkdir -p fdroid/repo
          printf '%s' "$FDROID_REPO_KEYSTORE_BASE64" | base64 --decode > fdroid/keystore.jks
          chmod 600 fdroid/keystore.jks

          cat > fdroid/config.yml <<EOF
          repo_url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/fdroid/repo
          repo_name: ${{ github.event.repository.name }}
          repo_description: Releases published from GitHub tags for ${{ github.event.repository.name }}.
          keystore: keystore.jks
          keystorepass: ${FDROID_REPO_KEYSTORE_PASSWORD}
          keypass: ${FDROID_REPO_KEY_PASSWORD}
          repo_keyalias: ${FDROID_REPO_KEY_ALIAS}
          EOF
          chmod 600 fdroid/config.yml

          cp release-assets/*.apk fdroid/repo/

          docker run --rm -v "${PWD}/fdroid:/fdroid" -w /fdroid debian:testing bash -c "apt-get update && apt-get install -y fdroidserver aapt && fdroid update --create-metadata"
          sudo chown -R $USER:$USER fdroid
          rm -f fdroid/keystore.jks fdroid/config.yml

      - name: Generate SHA256 checksums
        run: |
          set -euo pipefail
          (cd release-assets && sha256sum *.apk > SHA256SUMS.txt)

      - name: Grab latest Fastlane changelog
        id: changelog
        run: |
          set -euo pipefail
          CHANGELOG_FILE=$(find fastlane/metadata/android/en-US/changelogs -type f -name '*.txt' | sort -V | tail -n 1)
          echo "Found changelog: $CHANGELOG_FILE"
          echo "path=$CHANGELOG_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Restoid ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          body_path: ${{ steps.changelog.outputs.path }}
          files: |
            ${{ steps.collect_apks.outputs.files }}
            release-assets/SHA256SUMS.txt

      - name: Publish F-Droid repo to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: fdroid/repo
          destination_dir: fdroid/repo
          keep_files: true

      - name: Remove signing keystore
        if: always()
        run: |
          if [ -n "${ANDROID_SIGNING_KEYSTORE_FILE:-}" ] && [ -f "$ANDROID_SIGNING_KEYSTORE_FILE" ]; then
            shred -u "$ANDROID_SIGNING_KEYSTORE_FILE" || rm -f "$ANDROID_SIGNING_KEYSTORE_FILE"
          fi
